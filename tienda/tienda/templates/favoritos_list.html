<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Favoritos</title>
</head>
<body>
    <h1>Lista de Favoritos</h1>
    <table>
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Producto</th>
                <th>Fecha Agregado</th>
                <th>Prioridad</th>
            </tr>
        </thead>
        <tbody>
            {% for favorito in favoritos %}
            <tr>
                <td>{{ favorito.usuario.nombre }}</td>
                <td>{{ favorito.producto.nombre }}</td>
                <td>{{ favorito.fecha_agregado }}</td>
                <td>{{ favorito.prioridad }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'index' %}">Volver a la página de inicio</a>
</body>
</html>
